<script>
  (function () {
    function formatStars(count) {
      if (typeof count !== 'number') return '-- stars';
      if (count >= 1000) return (count / 1000).toFixed(count >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k stars';
      return count + ' stars';
    }

    function updateGitHubStars() {
      var starElements = document.querySelectorAll('.github-stars[data-repo]');
      var repoCache = {};

      Array.prototype.forEach.call(starElements, function (element) {
        var repo = element.getAttribute('data-repo');
        if (!repo) return;

        if (!repoCache[repo]) {
          repoCache[repo] = fetch('https://api.github.com/repos/' + repo)
            .then(function (response) {
              if (!response.ok) throw new Error('GitHub API error');
              return response.json();
            })
            .then(function (data) {
              return formatStars(data.stargazers_count);
            })
            .catch(function () {
              return '-- stars';
            });
        }

        repoCache[repo].then(function (label) {
          element.textContent = label;
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateGitHubStars);
    } else {
      updateGitHubStars();
    }
  })();
</script>
